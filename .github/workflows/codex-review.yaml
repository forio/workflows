name: Codex review

# Reusable PR review: `codex exec review` behind GitHub plumbing.
#
# Calling repos own the triggers, the concurrency group, and a build gate
# (review only spends tokens on a PR that compiles), then call this workflow
# with the named `OPENAI_API_KEY` secret — see templates/codex-review.yaml in
# this repo. Comment-trigger authorization happens in both caller and callee so
# untrusted PR code never runs before the caller's authorization gate.
on:
  workflow_call:
    inputs:
      built_sha:
        description: >-
          Merge commit SHA the caller's build job checked out and built. The
          review fails if the PR's merge commit no longer matches it, so the
          reviewed tree is always one that passed the caller's build.
        required: true
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true

env:
  # Exact paired version of @openai/codex and @openai/codex-responses-api-proxy.
  # The review rubric, output contract, and proxy behavior all ship with the
  # CLI, so bumping this is a behavior change: re-verify SPEC.md §3.1 against
  # the corresponding openai/codex release first.
  CODEX_REVIEW_CODEX_VERSION: 0.144.5

jobs:
  # Single source of truth for "should we run?" plus the PR number.
  # Everything else `needs:` this job, so if the guard is false the whole
  # chain is skipped.
  check:
    runs-on: ubuntu-latest
    # Run on PR open, OR on a "/codex-review [effort]" comment on a pull
    # request. The commenter's repository permission is checked by the
    # authorize step below, which also parses the optional effort argument.
    if: >-
      github.event_name == 'pull_request' || (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null)


    permissions:
      pull-requests: read
    outputs:
      base_ref: ${{ steps.pr.outputs.base_ref }}
      base_sha: ${{ steps.pr.outputs.base_sha }}
      checkout_sha: ${{ steps.pr.outputs.checkout_sha }}
      effort: ${{ steps.authorize.outputs.effort }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      should_run: ${{ steps.authorize.outputs.should_run }}
    steps:
      - name: Resolve PR number
        id: resolve
        run: |
          echo "pr_number=${{ github.event.pull_request.number || github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Authorize trigger
        id: authorize
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const DEFAULT_EFFORT = 'medium';
            // The efforts the pinned CLI names in its ReasoningEffort enum
            // (codex-rs/protocol/src/openai_models.rs). The CLI forwards
            // unknown values to the API unvalidated, so this set is the only
            // gate; re-check it when CODEX_REVIEW_CODEX_VERSION moves.
            const RECOGNIZED_EFFORTS = new Set([
              'none', 'minimal', 'low', 'medium', 'high', 'xhigh', 'max', 'ultra',
            ]);

            if (context.eventName === 'pull_request') {
              core.setOutput('should_run', 'true');
              core.setOutput('effort', DEFAULT_EFFORT);
              return;
            }

            const body = context.payload.comment.body ?? '';
            const firstLine = (body.trim().split(/\r?\n/, 1)[0] ?? '').trim();
            const [command, ...args] = firstLine.split(/\s+/);
            if (command !== '/codex-review') {
              core.setOutput('should_run', 'false');
              return;
            }

            const effort =
              args
                .map((arg) => arg.toLowerCase())
                .find((arg) => RECOGNIZED_EFFORTS.has(arg)) ?? DEFAULT_EFFORT;
            const discarded = args.filter(
              (arg) => arg.toLowerCase() !== effort,
            );
            if (discarded.length > 0) {
              core.notice(
                `Discarding /codex-review arguments with no effect: ${discarded.join(' ')}`,
              );
            }
            core.setOutput('effort', effort);

            const allowedPermissions = new Set(['admin', 'maintain', 'write']);
            const { owner, repo } = context.repo;
            const username = context.payload.comment.user.login;

            let permission = 'none';
            try {
              const { data } =
                await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username,
                });
              permission = data.permission;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const shouldRun = allowedPermissions.has(permission);
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

            if (!shouldRun) {
              core.notice(
                `${username} has ${permission} permission; ` +
                  'write, maintain, or admin is required for /codex-review.',
              );
            }

      - name: Resolve PR refs
        id: pr
        if: steps.authorize.outputs.should_run == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILT_SHA: ${{ inputs.built_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number('${{ steps.resolve.outputs.pr_number }}');
            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const checkoutSha = pr.merge_commit_sha;
            if (!checkoutSha) {
              core.setFailed(
                `No merge commit SHA is available for PR #${prNumber}.`,
              );
              return;
            }

            if (checkoutSha !== process.env.BUILT_SHA) {
              core.setFailed(
                `PR #${prNumber} merge commit ${checkoutSha} does not match ` +
                  `the built commit ${process.env.BUILT_SHA}; the PR changed ` +
                  'while the build ran. Re-run the workflow to review the ' +
                  'current code.',
              );
              return;
            }

            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('checkout_sha', checkoutSha);
            core.setOutput('head_sha', pr.head.sha);

  acknowledge:
    needs: check
    if: >-
      github.event_name == 'issue_comment' && needs.check.outputs.should_run == 'true'


    runs-on: ubuntu-latest
    permissions:
      issues: write # to add the 👀 acknowledgement reaction on the comment
      # Keep PR write too: a live issue_comment run rejected this reaction
      # when its token had issues:write but only pull-requests:read.
      pull-requests: write
    steps:
      - name: Acknowledge the triggering comment
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        # Non-fatal: a failed reaction must never block the review.
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID/reactions" \
            -f content=eyes || true

  codex:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      final_message: ${{ steps.run_codex.outputs['final-message'] }}
      codex_version: ${{ steps.review_meta.outputs.codex_version }}
      model: ${{ steps.review_meta.outputs.model }}
      effort: ${{ steps.review_meta.outputs.effort }}
      duration: ${{ steps.review_meta.outputs.duration }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Explicitly check out the authorized PR merge commit.
          ref: ${{ needs.check.outputs.checkout_sha }}
          persist-credentials: false

      - name: Verify pinned checkout
        env:
          EXPECTED_SHA: ${{ needs.check.outputs.checkout_sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Fetch PR refs
        env:
          BASE_REF: ${{ needs.check.outputs.base_ref }}
          BASE_SHA: ${{ needs.check.outputs.base_sha }}
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.check.outputs.head_sha }}
        run: |
          # Make the authorized base and head reachable for git diff/log.
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth_header" \
            fetch --no-tags origin "$BASE_REF" "$HEAD_SHA"
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm

      - name: Prepare Codex home
        id: codex_home
        run: |
          path="$RUNNER_TEMP/codex-review-home"
          mkdir -p "$path"
          cat > "$path/config.toml" <<'EOF'
          [shell_environment_policy]
          ignore_default_excludes = false
          exclude = [
            "GITHUB_ENV",
            "GITHUB_OUTPUT",
            "GITHUB_PATH",
            "GITHUB_STATE",
            "GITHUB_STEP_SUMMARY",
          ]
          EOF
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      # Install dependencies before the secret-bearing action starts, but never
      # execute lifecycle scripts from the PR. Repositories that require install
      # scripts must prepare dependencies on a separate runner without the key.
      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      # `codex exec review` is the CLI's /review code path: the review rubric
      # is the sub-thread's base instructions, and the CLI parses and renders
      # the reviewer's output. The instructions are the CLI's own base-branch
      # target prompt rendered with the authorized merge base — the checkout
      # is the PR merge commit, so the merge base with the base branch is
      # exactly the authorized base SHA.
      - name: Prepare review instructions
        env:
          BASE_REF: ${{ needs.check.outputs.base_ref }}
          BASE_SHA: ${{ needs.check.outputs.base_sha }}
        run: |
          printf "Review the code changes against the base branch '%s'. The merge base commit for this comparison is %s. Run \`git diff %s\` to inspect the changes relative to %s. Provide prioritized, actionable findings.\n" \
            "$BASE_REF" "$BASE_SHA" "$BASE_SHA" "$BASE_REF" \
            > "$RUNNER_TEMP/review-instructions.md"

      # Use the reference action for API-key isolation, Linux sandbox setup,
      # and irreversible sudo removal. The explicit actor allowlist preserves
      # the authorization decision already made by the check job.
      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        with:
          allow-users: ${{ github.actor }}
          codex-args: '["review", "-", "--config", "model_reasoning_effort=\"${{ needs.check.outputs.effort }}\""]'
          codex-home: ${{ steps.codex_home.outputs.path }}
          codex-version: ${{ env.CODEX_REVIEW_CODEX_VERSION }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ':workspace'
          prompt-file: ${{ runner.temp }}/review-instructions.md
          safety-strategy: drop-sudo

      - name: Record Codex review metadata
        id: review_meta
        env:
          CODEX_VERSION: ${{ env.CODEX_REVIEW_CODEX_VERSION }}
          CODEX_REVIEW_HOME: ${{ steps.codex_home.outputs.path }}
          CODEX_REVIEW_STARTED_AT: ${{ steps.codex_home.outputs.started_at }}
        run: |
          installed_codex_version="$(codex --version 2>/dev/null || true)"
          if [ -z "$installed_codex_version" ]; then
            installed_codex_version="@openai/codex@$CODEX_VERSION"
          fi

          resolved_model=''
          resolved_effort=''
          review_duration='unknown'

          format_duration() {
            seconds="$1"
            if [ "$seconds" -lt 60 ]; then
              printf '%ss\n' "$seconds"
            else
              printf '%dm %02ds\n' "$((seconds / 60))" "$((seconds % 60))"
            fi
          }

          read_review_turn_contexts() {
            while IFS= read -r -d '' rollout_file; do
              jq -s -r '
                (.[0].payload.thread_source? // "root") as $thread_source
                | select($thread_source == "subagent")
                | .[]
                | select(.type == "turn_context")
                | [
                    .timestamp,
                    (.payload.model // ""),
                    (.payload.effort //
                      .payload.collaboration_mode.settings.reasoning_effort //
                      "")
                  ] | @tsv
              ' "$rollout_file" 2>/dev/null || true
            done < <(
              find "$CODEX_REVIEW_HOME/sessions" \
                -type f \
                -name '*.jsonl' \
                -print0 2>/dev/null
            )
          }

          if [ -d "$CODEX_REVIEW_HOME/sessions" ]; then
            # The review runs in a sub-thread; its turn context names the
            # model that actually produced the findings.
            turn_context="$(read_review_turn_contexts | sort | tail -n 1)"

            if [ -n "$turn_context" ]; then
              IFS=$'\t' read -r _ resolved_model resolved_effort <<<"$turn_context"
            fi
          fi

          case "$CODEX_REVIEW_STARTED_AT" in
            ''|*[!0-9]*)
              ;;
            *)
              completed_at="$(date -u +%s)"
              elapsed_seconds="$((completed_at - CODEX_REVIEW_STARTED_AT))"
              if [ "$elapsed_seconds" -ge 0 ]; then
                review_duration="$(format_duration "$elapsed_seconds")"
              fi
              ;;
          esac

          {
            echo "codex_version=$installed_codex_version"
            echo "model=${resolved_model:-unknown}"
            echo "effort=${resolved_effort:-unknown}"
            echo "duration=$review_duration"
          } >> "$GITHUB_OUTPUT"

  post_feedback:
    needs: [check, codex]
    if: >-
      needs.check.outputs.should_run == 'true' && needs.codex.outputs.final_message != ''


    runs-on: ubuntu-latest
    permissions:
      issues: write
      # GitHub documents issues:write as sufficient for this endpoint, but a
      # live issue_comment run rejected it until the PR permission was writable.
      pull-requests: write
    steps:
      # The final message is already the review as the Codex CLI renders it
      # (overall explanation plus findings block); parsing and the fallback
      # for malformed reviewer output happen inside Codex itself.
      - name: Report Codex feedback
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          CODEX_REVIEW_CODEX_VERSION: ${{ needs.codex.outputs.codex_version }}
          CODEX_REVIEW_MODEL: ${{ needs.codex.outputs.model }}
          CODEX_REVIEW_EFFORT: ${{ needs.codex.outputs.effort }}
          CODEX_REVIEW_DURATION: ${{ needs.codex.outputs.duration }}
          PR_NUMBER: ${{ needs.check.outputs.pr_number }}
          REVIEWED_SHA: ${{ needs.check.outputs.checkout_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            function metadataValue(name) {
              return (process.env[name] ?? '').trim() || 'unknown';
            }

            const prNumber = Number(process.env.PR_NUMBER);
            const reviewedSha = process.env.REVIEWED_SHA ?? '';
            const { data: currentPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (!currentPr.merge_commit_sha) {
              core.setFailed(
                `No current merge commit SHA is available for PR #${prNumber}; ` +
                  'refusing to publish a review of unknown freshness.',
              );
              return;
            }

            if (currentPr.merge_commit_sha !== reviewedSha) {
              core.setFailed(
                `PR #${prNumber} is now at merge commit ` +
                  `${currentPr.merge_commit_sha}, but the review covers ` +
                  `${reviewedSha}; refusing to publish obsolete feedback.`,
              );
              return;
            }

            const review =
              (process.env.CODEX_FINAL_MESSAGE ?? '').trim() ||
              'Reviewer failed to output a response.';
            const footer = [
              '---',
              `Reviewed with \`codex exec review\` (${metadataValue('CODEX_REVIEW_CODEX_VERSION')}); ` +
                `model: ${metadataValue('CODEX_REVIEW_MODEL')}; ` +
                `effort: ${metadataValue('CODEX_REVIEW_EFFORT')}; ` +
                `time spent: ${metadataValue('CODEX_REVIEW_DURATION')}; ` +
                `commit: \`${metadataValue('REVIEWED_SHA')}\`.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [review, footer].join('\n\n'),
            });
