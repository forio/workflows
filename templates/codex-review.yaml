# Commit this file as .github/workflows/codex-review.yaml in the calling repo.
#
# The build job is this repo's own gate: the review only runs (and only
# spends tokens) when the PR compiles. Replace its steps with this repo's
# build. The caller authorizes comment triggers before any PR code runs; the
# shared workflow repeats that check as defense in depth, then handles checkout
# pinning, the Codex invocation, and posting the review comment.
#
# Requires the OPENAI_API_KEY secret; no other caller secret is forwarded.
#
# NOTE: for `issue_comment`, GitHub always runs the workflow file from the
# default branch (not the PR branch), so changes to this trigger only take
# effect once merged.
name: Codex review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

# One in-flight review per PR; a newer trigger cancels an older run.
concurrency:
  group: codex-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Automatic reviews only start for same-repository, non-Dependabot branches;
  # fork and Dependabot PRs require an authorized comment because their
  # pull_request runs cannot receive Actions secrets. `issue_comment` runs from
  # the trusted default branch, so authorize its commenter before the build
  # checks out or executes any PR-controlled code.
  authorize:
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]') || (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/codex-review'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_run: ${{ steps.authorize.outputs.should_run }}
    steps:
      - name: Authorize trigger
        id: authorize
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            if (context.eventName === 'pull_request') {
              core.setOutput('should_run', 'true');
              return;
            }

            const body = context.payload.comment.body ?? '';
            const firstLine = (body.trim().split(/\r?\n/, 1)[0] ?? '').trim();
            // Match the command token only; arguments (e.g. an effort like
            // `/codex-review high`) are parsed by the reusable workflow.
            if (firstLine.split(/\s+/, 1)[0] !== '/codex-review') {
              core.setOutput('should_run', 'false');
              return;
            }

            const allowedPermissions = new Set(['admin', 'maintain', 'write']);
            const { owner, repo } = context.repo;
            const username = context.payload.comment.user.login;

            let permission = 'none';
            try {
              const { data } =
                await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username,
                });
              permission = data.permission;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const shouldRun = allowedPermissions.has(permission);
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

            if (!shouldRun) {
              core.notice(
                `${username} has ${permission} permission; ` +
                  'write, maintain, or admin is required for /codex-review.',
              );
            }

  build:
    needs: authorize
    if: needs.authorize.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      built_sha: ${{ steps.built.outputs.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          # Comment triggers run against the default branch by default;
          # check out the PR merge ref instead. pull_request events already
          # check out the merge commit.
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || '' }}

      # The shared workflow refuses to review any other commit, so a PR that
      # changes mid-build fails instead of being reviewed unbuilt.
      - name: Record built SHA
        id: built
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Replace with this repo's build.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build

  review:
    needs: build
    permissions:
      contents: read
      issues: write
      # Permit the reusable workflow's PR-write workaround; called workflows
      # cannot elevate permissions above the calling job.
      pull-requests: write
    uses: forio/workflows/.github/workflows/codex-review.yaml@v1
    with:
      built_sha: ${{ needs.build.outputs.built_sha }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
